name: flux_ui
description: "The Basic and Dynamic Layout Widgets for FluxBuilder (Mobile E-commerce App) - https://fluxbuilder.com"
version: 0.0.16
homepage: https://fluxbuilder.com
publish_to: none # TODO: remove when to publish

environment:
  sdk: ">=3.10.0 <4.0.0"
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter

  inspireui: 2.4.2

  intl: any
  quiver: 3.2.2
  responsive_builder: 0.7.1
  universal_platform: ^1.1.0
  lottie: ^3.1.2
  extended_image: 10.0.1
  share_plus: 12.0.1
  flutter_svg: ^2.0.13
  animated_text_kit: 4.3.0
  html: ^0.15.4
  url_launcher: 6.3.2
  collection: any
  freezed_annotation: 3.1.0
  html_unescape: 2.0.0
  visibility_detector: 0.4.0+2
  smooth_page_indicator: 2.0.1
  carousel_slider_plus: 7.1.1

  # HTML render
  flutter_widget_from_html_core: 0.17.0
  fwfh_svg: 0.16.1
  fwfh_cached_network_image: 0.16.1
  fwfh_url_launcher: 0.16.1
  fwfh_chewie: 0.16.1
  fwfh_webview: 0.15.6

  google_fonts: 8.0.2
  build_runner: ^2.4.13
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.4.4
  freezed: 3.2.5
  json_serializable: ^6.8.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.

android.jetifier.ignorelist=armeabi_v7a_debug,arm64_v8a_debug,x86_64_debug,x86_debug,armeabi_v7a_release,arm64_v8a_release,x86_64_release,x86_release,armeabi_v7a_profile,arm64_v8a_profile,x86_64_profile,x86_profile,flutter_embedding
rive.ndk.version=28.2.13676358

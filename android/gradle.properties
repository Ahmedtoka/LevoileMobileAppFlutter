# Gradle 8.13 needs JDK 17 (not Java 21+/26). Set the JDK PER-MACHINE in your
# GLOBAL gradle.properties (~/.gradle/gradle.properties) or via JAVA_HOME —
# do NOT hardcode a machine path here, it breaks other machines and CI.
# Example for Mac/Homebrew (put this line in your ~/.gradle/gradle.properties):
